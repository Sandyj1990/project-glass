  zip:
    name: "ZIP · AJIO Commerce Agent"
    state: Live
    target_rung: L4
    # No /agents/zip/ detail page · documented on /kaily/ §04. The
    # link_override field routes the §03/§08 card to the platform page
    # where the agent is described instead of the canonical /agents/<slug>/.
    link_override: "/kaily/"
    deployments:
      - platform: jcp
        unlocks: "Conversational AI shopping on AJIO.com · natural-language search and recommendations over chat and voice · 88% positive engagement · 100% catalog coverage of 2.6M+ AJIO SKUs."

  jiia:
    name: "JIIA · JioMart Agentic Shopping Assistant"
    state: Live
    target_rung: L4
    link_override: "/kaily/"
    deployments:
      - platform: jcp
        unlocks: "Intent → bundle on JioMart · Gemini multimodal pipeline indexes 40M+ catalog images · featured on the Google Cloud Next '26 main stage on 29-Apr-2026."

  agentic-marketing:
    name: "Marketing Agent"
    state: Building
    target_rung: L4
    deployments:
      - platform: ucp
        unlocks: "Goal in plain English → audience, creative, channel mix, send time, measurement · autonomously, with humans only on guardrails."

  retail-vista:
    name: "Retail Vista"
    state: Building            # composite — Internal Live, Google Pilot, JioGIS Build
    target_rung: L4
    deployments:
      - platform: retail-vista
        unlocks: "Three-track agent · Internal (Opportunity Explorer Live · 68 scored leads) · Google (Vertex AI Pilot · Mumbai catchments) · JioGIS (Foundation model Building)."
        # Special case · the retail-vista platform IS the retail-vista agent's
        # own deployment surface. Per path-to-l4-spec §4.5, the §03 PATH TO L4
        # section here renders as a .grid-table with rows = the 3 tracks (not
        # rows = agents · since there's only one agent: itself). The tool reads
        # the `tracks:` list below and emits one row per track.
        tracks:
          - name: "Internal · UCP / JioMart"
            state: Live
            unlocks: "Opportunity Explorer · 68 scored leads · agentic decisioning end-to-end."
          - name: "Google · Joint MVP"
            state: Pilot
            unlocks: "Cannibalisation, feasibility and site-selection agents on Vertex AI · Mumbai catchments."
          - name: "JioGIS"
            state: Building
            unlocks: "Spatial reasoning core · Foundation model · feeds all 3 tracks once secured."

# Per-platform "current rung" — used by the sweep when rendering each
# platform's Path to L4 section header. These are the page-owner-confirmed
# values from path-to-l4-spec.md §8 R-O6.
platform_current_rungs:
  impetus: L3
  jcp: L3
  ucp: L3
  granary: L2
  retail-vista: L3

# Per-platform section number override. The default is "03" (canonical
# ordering: Path to L4 right after §02 What's live). Pages whose existing
# section spine puts What's live at a different number override here.
# JCP example: spine is Architecture §01 · Platform properties §02 ·
# What's live §03 · Deep dive §04 — so the new Path to L4 inserts at §04.
platform_section_nums:
  impetus: "03"
  jcp: "08"          # spine: 10-section story page · PATH-TO-L4 sits between §07 AI shipped and §09 Shipped this year
  ucp: "04"          # spine: Status · Architecture · Marketing OS · Case study · Release timeline; PATH-TO-L4 sits right after Marketing OS
  granary: "03"
  retail-vista: "03"

# Per-platform render-pattern override. The default rule is grid-table when
# 2+ agents on a platform, platform-card when 1. JCP overrides this to keep
# the card grid even with 3+ agents · the page's visual story is built around
# cards, and the milestone column doesn't apply (no source-grounded dates yet).
platform_pattern_overrides:
  jcp: platform-card

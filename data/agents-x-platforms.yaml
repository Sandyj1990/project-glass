# Agents × Platforms · single source of truth for the Path to L4 surfacing
# ===
# Per docs/path-to-l4-spec.md §6.1.
#
# Each canonical agent (from /agents/index.html) lists every platform page it is
# deployed in, with a 1-line "what it unlocks for THIS platform" string per
# deployment. tools/inject_path_to_l4.py reads this and:
#   - injects the §03 Path to L4 section into each listed platform page
#   - injects the "deployed in: [platforms]" list into each agent page
#   - --check exits non-zero if either side drifts from the registry
#
# Edit this file when an agent lands on a new platform OR an existing
# deployment changes state. Then run:
#   python tools/inject_path_to_l4.py --dry      # preview
#   python tools/inject_path_to_l4.py            # apply
#   python tools/inject_path_to_l4.py --check    # CI / pre-commit gate
#
# Format note · resolved Round 2 · 03-May-2026:
#   The reverse index (platform -> [agents]) is auto-derived by the sweep
#   tool from this `agents:` map. Do NOT hand-maintain a `platforms:` block
#   here — it would diverge.

agents:

  cortex-planning:
    name: "Cortex Planning Agent"
    state: Building            # Live | Building | Roadmap
    target_rung: L4
    deployments:
      - platform: impetus
        unlocks: "Store-realistic Plan of Record + continuous, exception-led replanning across the Impetus stack."
        next_milestone: "25-May-2026 · Pilot Hit/Year decision (category-led model)"
      - platform: granary
        unlocks: "Same agent applied to grocery: assortment + replenishment for 12 K SKUs × 4 K stores."
        next_milestone: "-"

  trend-to-design:
    name: "Trend-to-Design Agent"
    state: Live
    target_rung: L4
    deployments:
      - platform: impetus
        unlocks: "Trend brief → manufacturable design package without humans in the design cycle middle."
        next_milestone: "30-May-2026 · Saree drape (Category 15) + Indian designer (Category 42) + sherwani craft (Category 7) improvement window"

  category-intelligence:
    name: "Category Intelligence Agent"
    state: Building
    target_rung: L4
    deployments:
      - platform: impetus
        unlocks: "Category × season × geography → 40-50 pp evidence-tagged trend report for buying teams."
        next_milestone: "-"

  ai-photoshoot:
    name: "AI Photoshoot Agent"
    state: Live
    target_rung: L4
    deployments:
      - platform: impetus
        unlocks: "Flat-lay or mannequin product image → on-model 4K catalogue shoot in 2-4 minutes, with autonomous detection, surgical edit and Ajio-standard delivery."
        next_milestone: "28-May-2026 · Ethnic wear pipeline (kurtas, kurta sets, ethnic dresses)"

  generative-media:
    name: "Generative Media Agent"
    state: Building
    target_rung: L4
    # No Reliance brand deployment yet (03-May-2026). Agent runs end-to-end on
    # the Fynd-product side (SocialPilot). Add `- platform: <slug>` block here
    # when the Reliance pilot lands; injector will then surface this agent on
    # that platform's §03 PATH TO L4 section.
    deployments: []


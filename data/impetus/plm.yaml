# Impetus PLM (Product Lifecycle Management)
# Sourced verbatim from Q1 2026 Release Compendium pp. 14–20
# Per docs/impetus-restructure-spec.md · §A.3

slug: plm
title: Impetus PLM
sub_title: "(Product Lifecycle Management)"
aliases: [Yousta PLM, Centric replacement]
tagline: End-to-end product lifecycle — Design → Tech Pack → Sourcing → Production. Replaces Centric PLM. One login, no separate credentials.
category: Buy / Make
status: live
status_label: Live

audience:
  - Fashion Designers
  - Technical Designers
  - Buyers
  - Product Managers
  - Sourcing Teams

what_it_does: |
  Impetus PLM replaces Centric PLM for design, tech pack and product development.
  Designers create and manage styles, tech packs and material lists (Bill of Materials)
  with clear high-quality images and simpler navigation. Technical designers generate
  detailed specs that flow automatically into costing and production systems. Buyers
  manage fabric libraries and vendor allocations.

  Everything connects end-to-end, to Costing Engine for pricing, to EAN (product
  barcodes) and to NextWave/FTF for trend data. One login (SSO, Single Sign-On) via
  Impetus Platform — no separate credentials.

scale_label: Rollout Status
scale:
  - "Rolled out: Yousta Mens Wear (14 Apr 2026)"
  - "All Centric styles migrated"
  - "Upcoming: Yousta All Segments & Azorte & Fashion Factory (20 Apr)"
  - "Upcoming: Trends (23 Apr)"
scale_caption: |
  Phased migration off Centric, format-by-format. Dedicated ticket-based support channel
  live for post-rollout issues.

what_improved:
  body: |
    Design documentation time reduced **80%** via auto-generated tech specs. Full
    Centric PLM migration completed — single platform for all product data. One-login
    access (SSO) via Impetus Platform, no separate credentials needed. High-quality
    tech pack images with simplified, intuitive UI. Full style lifecycle: moodboard →
    design → tech pack → costing → production. Connected to CMT for consistent master
    data and to Costing Engine, barcodes and FTF. AI-generated walkthrough videos +
    open house sessions for rapid onboarding.
  expected_metric_impact: |
    80% less design documentation time means designers ship more styles per person per
    season. Replacing Centric eliminates a per-seat licence cost and the hand-off lag
    between Design and Costing. Format-by-format rollout (Yousta Mens → Yousta All →
    Azorte → Fashion Factory → Trends) means migration risk is bounded per format.


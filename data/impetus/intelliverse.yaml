progress:
  current_level: 3
  current_summary: |
    IntelliVerse is the most operationally mature platform in the stack and sits at
    **L3 · Intelligent** today across multiple workflows. Early defect detection
    at 10% (vs. 70%), one-timeline-per-product, automatic late-delivery penalties,
    and real-time partner onboarding all describe a system that **predicts and
    self-corrects** within guardrails. L4 is where the system reroutes orders and
    re-allocates capacity across the supplier network without a sourcing manager
    intervening.
  workflows:

what_improved:
  body: |
    **Quality inspectors catch defects at 10% order completion (vs 70%), saving 2-3
    weeks rework.** Suppliers see one consolidated timeline per product per month
    (vs 3 separate timelines). Format heads can delay delivery dates and the system
    recalculates penalties automatically. New partners (AJIO, LivSmart, Fynd Create)
    added via configuration, not custom code. **PO-to-Shipping cycle: 55 → 30 days
    (45% faster).**
  expected_metric_impact: |
    catching defects at 10% instead of 70% saves the cost of re-manufacturing 60%
    more of an order. The 55 → 30 day PO-to-ship compression is the headline supply
    chain win of the quarter — every additional day of pipeline cycle ties up
    working capital and pushes back markdowns.

updates_shipped:
  - date: "1 Apr 2026"
    heading: "Easier Partner Onboarding + Smarter Purchase Orders"
    bullets:
      - "Adding new partners is now self-serve (AJIO, LivSmart, Fynd Create live with own rules)."
      - "Buyers can delay specific items instead of cancelling entire orders; real-time notifications."
      - "Stability fixes for supplier and order data pushed to production."
  - date: "1 Apr 2026"
    heading: "System Health Monitoring Live"
    bullets:
      - "Live dashboards for packing speed, error rates, bottlenecks."
      - "Automatic error detection, **diagnosis in minutes, not hours**."
  - date: "31 Mar 2026"
    heading: "Better Quality Checks + Mobile QR Access for Suppliers"
    bullets:
      - "**For quality inspectors:** Filter inspection records by supplier, factory and inspection type. Bulk import/export of inspector-to-factory assignments (previously done one at a time). **Sampling capacity increased from 32,000 to 1 crore items for high-volume orders.**"
      - "**For suppliers:** QR code on the desktop app opens the mobile shipping app instantly, added because factory workers didn't know the mobile version existed. **Reduces time spent finding the right tool.**"
      - "**For everyone:** New financial year invoice series (FY 2026-27) active from 1st April."
  - date: "27 Mar 2026"
    heading: "Shein-Specific Settings"
    bullets:
      - "Shein has different operational needs: higher tolerance for extra scanning (raised from 5% to 10%), multi-barcode scanning for warehouse boxes, automatic blocking of shipments past delivery date and a separate penalty toggle (Shein suppliers aren't charged late-delivery penalties). **These are all configurable per partner, no impact on other partners' workflows.**"
  - date: "21 Mar 2026"
    heading: "Early Defect Detection · Catch Problems at 10%, Not 70%"
    bullets:
      - "Previously, the first hard quality check happened when 70% of an order was finished. If defects were found that late, re-manufacturing was expensive and time-consuming. **This new checkpoint at 10% lets teams course-correct early and cheaply.**"
      - "Automatically triggered when 10% of finishing is complete. Supplier picks date/time/location. If it passes → the 70% final check is unlocked. If it fails → the defective portion is removed, supplier re-manufactures and a new inspection is automatically scheduled."
      - "**Business outcome:** fewer rejected batches at final inspection, lower re-manufacturing costs, shorter delivery delays. If even 10% of defective batches are caught early, this can save weeks of delays per batch and lakhs in re-manufacturing cost."
  - date: "21 Mar 2026"
    heading: "One Timeline Per Product · No More Juggling 3 Schedules"
    bullets:
      - "When a product appeared in 3 purchase orders with 3 different delivery dates in the same month, the system created 3 separate production timelines, confusing suppliers and making it harder to spot delays."
      - "Now: one consolidated TnA (Time &amp; Action, production timeline) per product per month. Starts from the earliest delivery date. Full visibility from fabric arriving at the factory through to the finished shipment. **Business outcome:** suppliers can plan production more efficiently, spot bottlenecks earlier and reduce missed delivery dates, **directly improving OTIF (On-Time In-Full) scores**."
  - date: "20 Jan 2026"
    heading: "Automatic Late-Delivery Penalties for Suppliers"
    bullets:
      - "Structured penalty: 0.5% per day for first 7 days late, then 1% per day for the next 8 days. After 15 days late, the order is automatically closed. Updated on all purchase order documents. **Business outcome: creates clear accountability.** Suppliers know exactly what happens if they're late. Finance teams have standardised deductions. Expected improvement: faster supplier compliance, fewer delivery escalations."
  - date: "Earlier Releases (Posted Later)"
    heading: "Delivery Date Delays, Fair for Both Sides + Full Penalty Audit Trail"
    bullets:
      - "**For format heads:** Can now push delivery dates when a store isn't ready to receive goods (demand shifted, space constraints). System immediately blocks shipments for unshipped quantities and recalculates all supplier timelines."
      - "**For suppliers:** Late-delivery penalties only apply after the new (delayed) date, not the original. Existing penalties aren't automatically erased, suppliers can request a review. Original dates are kept for audit purposes."
      - "**Full Penalty Audit Trail for Finance Teams:** Downloadable penalty reports. Complete history of every delay and penalty per product. Automatic debit notes synced to the SAP. Better filtering and batch review for waiver requests. **Reduces manual reconciliation work for finance teams.**"


slug: recollect
title: Recollect
sub_title: "(Reconciliation · Procure-to-Pay Matching)"
aliases: [Reconciliation Engine, Reco]
tagline: Automatic 3-way matching (PO + GRN + Invoice). Auto-flags discrepancies; auto-debit notes for late deliveries and lost-in-transit shipments.
category: Sell · Reconciliation
status: live
status_label: Live

audience:
  - "Commercial &amp; Audit Teams (payment reconciliation)"
  - "Logistics Teams (courier invoice validation)"
  - "Vendors (receivables visibility)"

what_it_does: |
  **Finance and audit teams** get automatic 3-way matching (PO + GRN + Invoice) —
  the system checks whether the Purchase Order, Goods Receipt Note and supplier
  invoice all agree. When they don't, the discrepancy is flagged and routed to the
  right person.

  **Logistics teams** now have a dedicated module for checking courier invoices
  against actual shipment data, replacing manual spreadsheet reconciliation. Rules
  can be configured per courier partner based on contract terms.

  **Suppliers** get clearer visibility into their payments.

scale_label: Adoption
scale:
  - "10 rules configured across 6 courier partners"
  - "Rule types: Late Delivery · Auto Lost in Transit (+2 existing Lost in Transit rules)"
  - "eCN flow deployed · pilot completed with first vendor"
  - "First Credit Note ₹5,125 accepted &amp; posted to JioGST portal (Apr 3)"
  - "Backdated AWBs being processed from Feb 2026 onwards"
scale_caption: |
  Roadmap: payment dashboard, SAP integration for debit/credit notes, auto-ticketing
  for vendor CN non-acceptance.

what_improved:
  body: |
    **eCN (Electronic Credit Note) flow live with JioGST integration.** When goods
    received at the warehouse don't match what the supplier invoiced (short
    shipments, wrong items, returns), the commercial team previously handled credit
    notes manually via offline coordination. **This new flow automates the entire
    lifecycle, from discrepancy detection to vendor acceptance to GST portal posting.**
    For commercial &amp; audit teams: system auto-identifies invoice discrepancies and
    generates eCNs. Vendors accept or reject on-platform. On acceptance, the Credit
    Note is posted directly to the JioGST portal, confirmed working in production.
    GST compliance window enforced: eCN auto-disabled after 160 days from invoice date.

    **Courier Invoice Reconciliation live.** Logistics teams previously reconciled
    courier invoices against shipment data using spreadsheets — manual, slow, error-
    prone. This brings the full workflow onto the platform: AWB Ledger, configurable
    rules, automatic debit notes, insurance tracking, guided invoice checker.
  expected_metric_impact: |
    faster courier invoice processing, fewer overpayments (every incorrectly paid
    courier invoice is a direct cost leak). 10 rules now live across 6 courier
    partners means automatic detection of late deliveries and lost-in-transit
    shipments — debit notes generated without manual intervention. Finance teams
    spend less time on spreadsheet reconciliation, more time on exception handling.
    Once fully rolled out, commercial teams will recover discrepancy amounts
    automatically instead of manual offline follow-ups, **directly improving working
    capital recovery speed and reducing revenue leakage from unreconciled invoices.**


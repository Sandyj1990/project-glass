    heading: "eCN (Electronic Credit Note) Flow, Pilot Live with JioGST Integration"
    bullets:
      - "**For Commercial &amp; Audit teams:** System auto-identifies invoice discrepancies (article mismatches, returns to seller, partial shipments) and generates eCNs. Vendors accept or reject on-platform. On acceptance, the Credit Note is posted directly to the JioGST portal, confirmed working in production (first CN of ₹5,125 accepted and posted successfully on Apr 3). GST compliance window enforced: eCN auto-disabled after 160 days from invoice date."
      - "**For Vendors:** Visibility into pending credit notes on the Reco platform. Accept or reject with clear timelines. No more offline back-and-forth with commercial teams."
      - "**Status &amp; business outcome:** Pilot completed with first vendor, end-to-end flow confirmed working including JioGST posting. Scale-up pending data validation."
  - date: "27 Feb 2026"
    heading: "Courier Invoice Reconciliation Goes Live"
    bullets:
      - "**AWB Ledger:** Complete record of all AWB records for matching against invoices."
      - "**Configurable rules:** Finance teams set matching rules per courier partner based on contract terms, no engineering help needed."
      - "**Automatic Debit Notes:** When discrepancies are found, debit notes are generated automatically."
      - "**Insurance tracking:** Courier insurance limits now visible and configurable."
      - "**Guided invoice checker:** Step-by-step wizard for validating courier invoices, replaces manual spreadsheet work."


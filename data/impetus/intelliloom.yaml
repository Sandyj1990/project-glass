# § 01 · For
audience:
  - Buyers
  - Planners
  - FCoE (Fabric Centre of Excellence)
  - Format Heads
  - Sourcing Managers
  - Mill Vendors

# § 02 · What It Does for You
what_it_does: |
  Buyers and planners raise fabric requests through structured forms instead of
  ad-hoc emails and WhatsApp messages, with mandatory fields and audit trails.
  Format heads approve fabric budgets in a step-by-step workflow (planner submits
  → format head reviews → finance approves) with the option to approve fully,
  partially, or send back for revision. Mill suppliers receive orders based on
  intelligent recommendations considering their production capacity, capabilities
  and past performance and can accept or reject with real-time tracking.

# § 03 · How Many People Use It / How Much Is Being Managed / Scale
scale_label: How Much Is Being Managed
scale:
  - "₹420 crore+ in fabric orders on platform"

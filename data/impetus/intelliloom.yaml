scale_caption: |
  Meaningful adoption across the full fabric ordering workflow, most value already
  in advanced stages (supplier assignment and buyer decisions).

# § 04 · What Improved
what_improved:
  body: |
    Buyer can no longer accidentally over-order fabric, the system enforces AOP
    (Annual Operating Plan) limits. Planners have clear visibility into how much
    OTB budget is available at each level. Format heads maintain control over
    procurement decisions with approve/reject/revise workflows. Mill suppliers
    get allocated work based on their actual track record, not just whether they
    have capacity. 38 improvements shipped in one month (March).
  expected_metric_impact: |
    over-ordering reduced (every rupee of fabric over-purchase ties up working
    capital), budget compliance improved, format-level accountability established.
    ₹420Cr+ now governed on-platform, compared to zero 6 months ago.

# § 05 · Updates Shipped (Latest First)
updates_shipped:
  - date: "2 Apr"
    heading: "March Improvements, 38 Updates in 11 Releases"
    bullets:
      - "**For buyers/planners, easier data entry:** Visual indicators on required fields, locked columns to prevent accidental edits, frozen header rows for reference, dropdown selections for common fields (reducing typing errors)."
      - "**For buyers, faster decisions:** Fabric requests automatically advance when all required fields are filled. Support for products with multiple styles. History tracking for reviewed requests. Colour tracking added."
      - "**For sourcing teams, better supplier management:** Batch tracking and request IDs added to supplier views. Quick filters in download reports. Product codes and supplier codes now editable during upload. Search and filter by batch, request, or colour."
      - "**For data quality:** Stronger upload checks (preventing wrong file types, invalid numbers, wrong batch assignments). Fashion grade now mandatory. Supplier type restricted to valid values only."
  - date: "19 Feb"
    heading: "Fabric Budget Controls + Supplier Assignment + Format Head Approval"
    bullets:
      - "**Fabric OTB (Open-to-Buy) controls:** Fabric purchasing now aligned with garment AOP (Annual Operating Plan) targets. No more buying fabric without a corresponding garment plan. **Directly reduces excess fabric inventory risk.**"
      - "**Supplier assignment:** After fabric requests are approved, they're assigned to specific suppliers with controlled limits. Real-time tracking of how much each supplier has consumed."
      - "**Format head approval:** Step-by-step: planner submits → format head reviews → finance approves. Can approve fully, partially (must explain why), or send back. **Creates accountability at every level.**"
  - date: "5 Feb"
    heading: "Structured Fabric Requests, Replacing Emails and WhatsApp"
    bullets:
      - "Buyers, product managers and fabric specialists now capture fabric needs through a structured form. Template-driven with mandatory fields. Searchable views with filters and audit history. Automatic tagging as 'Urgent' or 'Hybrid' based on lead times. Single or bulk conversion from request to confirmed order. Full audit trail of who did what and when. **Standardises how fabric demand is communicated, reduces errors and improves traceability.**"


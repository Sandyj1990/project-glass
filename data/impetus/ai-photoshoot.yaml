what_improved:
  body: |
    Images delivered in hours, not weeks, at **90% lower cost**. Brand partners
    (Ed-a-Mamma, The Pant Project, Label Aeris) received full catalogues in days.
    ~4,000 videos delivered for international brands (RedTag, Noxtra, Namshi,
    Yousta) in March. **Catalogue production time: 15 days → 5 hours (99% reduction).**
    88% first-pass acceptance, minimal rework needed.
  expected_metric_impact: |
    every product launch is decoupled from photoshoot calendars and budget. The
    Buda Jeans / Superdry SDX case study (120 designs in 5 days, live on AJIO product
    link) is the canonical proof that this is L4-Agentic catalog production at
    operating scale, not a demo.


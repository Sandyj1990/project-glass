# § 02 · What It Does for You
what_it_does: |
  **A unified command center to monitor, plan, and act across your entire retail
  ecosystem from a single pane** — with real-time visibility into stores, inventory,
  workforce, and customer metrics. (Accenture · slide s13)

  Open one screen and the whole business is there — revenue, gross margin %, store
  performance, inventory health, vendor compliance and Annual Plan tracking, refreshed
  daily with no reports to request. The system surfaces what matters: aged inventory
  piling up, stores running out of stock, vendors missing delivery targets. Built-in
  AI explains why a number moved, not just that it moved. Works on Desktop, iPad and
  Mobile (iOS), use it in meetings and store visits.

  Six modules live: Portfolio Health, Margin Analysis, Store Intelligence, Inventory
  Health, Vendor Performance and AOP (Annual Operating Plan) Tracking.

# Sidebar callout · Retail Clock from Accenture s4
what_it_does_sidebar:
  tag: "Operating cadence · Accenture s4"
  title: "Cortex IS the cadence layer"
  body: |
    All decisions and operations are governed by a **six-cadence Retail Clock** —
    real-time (milliseconds · RFID, POS, IoT) → minutes (low-stock alerts, footfall) →
    hourly (store vs plan) → shift (manager scorecards) → daily (sales, aged stock) →
    monthly (model retraining). With AI, every cadence compresses; monthly reviews
    become continuous. Cortex is where this clock lives.

# § 03 · Features live today (sub-sectioned per spec §10.1, replaces flat chip strip)
subsections:
  label: "How Many People Use It · Features Live Today"
  section_num: "03"
  items:
    - tag: "Sub-section · Command Center [1/2] + [2/2] · Accenture s13–s14"
      heading: "Command Center · the unified monitor-plan-act surface"
      body: |
        **Monitor, plan, and act across your entire retail ecosystem from a single
        pane** — real-time visibility into stores, inventory, workforce and customer
        metrics. Scan to watch the demo video.

        **Six modules live:** Store Operations (real-time health, footfall,
        conversion, staffing per store) · Inventory Intelligence (stock-level
        visibility, auto-replenishment triggers, demand forecasting) · Workforce
        Management (scheduling, attendance, performance dashboards) · Campaign
        Control (launch, monitor, optimise AI campaigns with unified analytics) ·
        Customer 360° (NPS, loyalty, purchase history, engagement) · Alerts &amp;
        Escalations (configurable thresholds with automated workflows).

        **Today's numbers (verbatim from Q1 Compendium pp. 5-11):** Revenue
        ₹22.2 Cr/day · GM% 39.9% · 4 zones, 10 states, 3,198 stores · Inventory
        ₹1,442 Cr total (6.9% aged &gt;180 days, ₹85.1 Cr at risk) · Vendor OTIF
        70.6% (vs 90% target) · Fill Rate 87% (vs 95%) · CEO + 8 leadership roles
        · Desktop, iPad, iOS.
      image: "https://socialassets.impetusz0.de/rrl-portfolio/assets/impetus/_accenture/s14/img-01.jpg"
      caption: "Accenture · Command Center [2/2] · slide s14"

    - tag: "Sub-section · Accenture s12 · AI Agents"
      heading: "AI Agents · Trend-to-Design"
      body: |
        **Transforms trend + brand context into manufacturable design options and
        auto-generates complete tech packs** (specs, BOM, trims, artwork) for
        vendor-ready handoff.

        Sibling agents in the same family: **Planning Agent (Cortex)** — builds a
        store-realistic Plan of Record and converts it into fixture/slot-level VM
        layouts, with exception-led replans. **Agentic Marketing** — autonomously
        builds and optimises campaigns (audiences, creatives, timing, measurement)
        using customer signals. **Ask Impetus · AI Business Analyst** — turns
        cross-system retail data into executive-ready answers, explains "why,"
        quantifies impact, and recommends the next best fix.

    - tag: "Sub-section · Accenture s15 · Agentic Control Tower"
      heading: "Agentic Control Tower"
      body: |
        **An agent-driven control tower that detects, prioritises, and resolves
        business exceptions in real time.** This is where the Retail Clock cadences
        meet automatic action — every alert is an exception flowing into a workflow
        that the system attempts to resolve before it reaches a human.
      image: "https://socialassets.impetusz0.de/rrl-portfolio/assets/impetus/_accenture/s15/img-01.jpg"
      caption: "Accenture · Agentic Control Tower · slide s15"

    - tag: "Sub-section · Accenture s16 · Store Intelligence"
      heading: "Store Intelligence"
      body: |
        **AI-powered store intelligence that decodes demand, competition, and
        localised growth opportunities.** Every store becomes a node in a sensing
        network — local demand signals, competitive density and demographics feed
        the assortment, pricing and marketing decisions for that catchment.
      image: "https://socialassets.impetusz0.de/rrl-portfolio/assets/impetus/_accenture/s16/img-01.jpg"
      caption: "Accenture · Store Intelligence · slide s16"

# § 04 · What Improved
what_improved:
  body: |
    Leadership gets a daily portfolio view without asking for reports. You can find
    exactly where profit is leaking and drill down in 2 clicks. Underperforming zones
    and stores are sorted and surfaced instantly. Aged inventory (₹85.1 Cr >180 days)
    and stockouts (805 stores running out) are flagged automatically. Vendor ranking
    and lead times are live, with on-time delivery and fill rate tracked. You can
    compare actuals to the annual plan by category, channel or format. The Buy Plan
    module shortlists 3,492 styles flowing straight to the Costing Engine.
  expected_metric_impact: |
    decisions move from monthly review meetings to the same screen everyone uses
    daily — with AI explaining the "why" behind every number. The shortest path
    between a number changing and someone deciding to act on it.


scale_caption: |
  Replaced Freshdesk; old tool licence not renewed. Historical ticket data being
  migrated for continuity.

what_improved:
  body: |
    **Everyone** has one place for support, no more switching to a separate tool.
    **Support agents** get AI-suggested solutions that update with every message.
    **The organisation** saves **~₹55 lakh per year** by retiring the old support
    tool's license. **Key metrics:** support ticket resolution TAT (Turnaround Time)
    reduced **40-60%**. ₹55L annual cost saved by retiring Freshdesk license.
    **100% adoption in 2 weeks, zero users left behind.**
  expected_metric_impact: |
    direct ₹55L/year cost out + 40-60% TAT reduction means the support team's L1
    capacity effectively expands ~2x without hiring. The AI resolution suggestion
    is the L2 → L3 path for InstaDesk on the autonomy ladder — system recommends,
    human accepts/overrides.


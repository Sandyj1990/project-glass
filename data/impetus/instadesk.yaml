# InstaDesk · Unified Support Platform
# Sourced verbatim from Q1 2026 Release Compendium pp. 101–103
# Per docs/impetus-restructure-spec.md

slug: instadesk
title: InstaDesk
sub_title: "(Unified Support Platform)"
aliases: []
tagline: One support tool for everyone — replaced Freshdesk, saved ~₹55L/year, 100% adoption in 2 weeks. AI suggests resolutions that update after every customer reply.
category: Operate · Helpdesk
status: live
status_label: Live

audience:
  - "All 2,000+ Impetus platform users — buyers, operations staff, sourcing managers"
  - Suppliers
  - Store Teams
  - "Anyone who needs to raise or manage support tickets"

what_it_does: |
  **Everyone** creates and manages support tickets directly from the Impetus platform,
  no separate login or software needed. Covers all types of issues: shipping problems,
  invoice questions, quality disputes, production delays, planogram issues (for store
  users) and general requests. Supports file attachments (spreadsheets, PDFs,
  documents, images), has role-based access (separate views for ticket handlers vs.
  ticket raisers), full email integration and SLA tracking dashboards.

  **AI suggests resolutions** that update after every new message, currently for ASN
  (shipping), AWB (courier tracking), Fit/PP (quality sampling) and DPR (Daily
  Production Report) issues.


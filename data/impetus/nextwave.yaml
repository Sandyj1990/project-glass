slug: nextwave
title: NextWave
sub_title: "(Trends Analysis · Fashion Trends Forecasting)"
aliases: [FTF, Fashion Trends Forecasting, Trends Analysis]
tagline: Social, celebrity, regional, marketplace and competitor trend signals — all in one place to answer "what should I design and buy next?"
category: Plan
status: live
status_label: Live

audience:
  - Fashion Designers
  - Buyers
  - Category Heads
  - Planners

what_it_does: |
  Designers access social media trend data, industry reports (EDITED, WGSN) and
  competitor intelligence — all in one place — to answer the question "What should I
  design next?" Buyers and category heads connect trend data to their range planning
  tools through an automated data pipeline.

  Fashion Eye provides visual trend browsing by category, style and season.
  ~424 users have access; ~81 active in the last 6 months (~19%). Low active usage
  reflects the leadership direction: moving from 400 human designers manually browsing
  trends to AI-native flows where fewer designers curate AI-generated outputs, so the
  tool's value shifts from daily usage to quality of design decisions. Leadership
  direction: move toward AI-generated designs where human designers curate rather
  than create from scratch.

scale_label: Reach &amp; Adoption
scale:
  - "~424 users with access"
  - "~81 active in last 6 months (~19%)"
  - "EDITED + WGSN industry reports embedded"
  - "Fashion Eye · visual trend browsing"
  - "Celebrity Corner · social media corpus"
  - "Regional Trends · 11 divisions of India"
  - "Ajio trending queries · live demand signal"
scale_caption: |
  Active usage low and falling on purpose — the platform is the substrate for
  AI-native design flows, not a daily browse tool.

what_improved:
  body: |
    Designers no longer leave the platform to read trend reports — EDITED data is
    inside Impetus with full categorisation. Trend signals automatically feed into
    range planning tools, connecting "what's trending" to "what should we buy."
    Visual trend discovery has better image quality, plus new profile pages with
    category browsing — designers can quickly scan what's trending visually without
    reading reports.
  expected_metric_impact: |
    every trend cycle, fewer designers spend less time aggregating signals and more
    time deciding which signals to act on. Sets the stage for AI-generated range
    plans where humans curate rather than create.


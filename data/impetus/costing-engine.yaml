  - "Trends: 1,598 options costed (46%)"
  - "Yousta: 836 options costed (85%)"
  - "Azorte: 385 options costed (43%)"
  - "Integrated with Cortex + PLM"
scale_caption: |
  Costing pipeline live for the three highest-velocity formats (Trends, Yousta, Azorte);
  data flows in from the Buy Plan in Cortex without re-entry.

what_improved:
  body: |
    **Automated style-to-cost flow** — no manual data entry from Buy Plan. Every
    option submitted from Cortex now shows up in Costing (older gap closed too).
    Clear on-screen validation when product details are missing (colour, season).
    **Approved costs sync back to Cortex automatically — one source of truth for
    pricing.**
  expected_metric_impact: |
    every option that used to take a buyer ~30-60 minutes of spreadsheet wrangling
    now takes a click, with vendor pricing and approval routing baked in. The
    Cortex ↔ Costing ↔ PLM closed loop is the substrate for the L2 → L3 jump on
    Costing in the autonomy framework.


progress:
  current_level: 3
  current_summary: |
    UVP sits at **L3 · Intelligent** today: real-time supplier graph, vendor scorecards
    auto-generated, DSD configured per partner. The Shein implementation already
    operates at the edge of L4 — system selects supplier, negotiates against target
    cost, places preliminary orders. The 2-weeks-to-4-days negotiation cycle is the
    L2 → L3 jump quantified.

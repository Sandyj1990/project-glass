slug: uvp
title: UVP
sub_title: "(Unified Vendor Platform)"
aliases: [Unified Vendor Platform, DSD, Direct Store Delivery]
tagline: One platform for vendor contracts, pricing and onboarding across every brand. DSD turnaround down to 5 days (industry first); negotiation cycles 2 weeks → 4 days.
category: Buy · Vendor
status: live
status_label: Live

audience:
  - Sourcing Teams
  - Vendor Managers
  - Commercial Teams
  - "Audit &amp; Compliance Teams"

what_it_does: |
  One platform for all vendor contracts, pricing and onboarding across every brand.
  Sourcing teams see standardised vendor pricing, run onboarding workflows and
  compare pricing across brands in one place — replacing fragmented trackers.
  Direct Store Delivery (DSD), goods delivered straight from vendor to store,
  and Procuro orders are configured here. Real-time vendor performance is visible
  without chasing reports.

  **DSD turnaround down to 5 days (industry first); negotiation cycles from 2 weeks
  to 4 days.**

scale_label: How Many People Use It
scale:
  - "DSD: 5-day turnaround (industry first)"
  - "Negotiation: 2 weeks → 4 days"
  - "3.5 Cr DSD shipments processed"
  - "Cross-brand vendor visibility live"
scale_caption: |
  The vendor co-creation platform Shein uses; same surface now hosts Trends,
  Azorte, Yousta and Fashion Factory vendor relationships.

what_improved:
  body: |
    **One place for vendor pricing across all brands** — no more version conflicts.
    Faster procurement through automated onboarding and approval flows. Vendor
    performance and compliance visible in real time. Direct Store Delivery (DSD) +
    Procuro vendor setup and pricing live for Shein. Order placement and fulfilment
    streamlined end-to-end. **Pricing updates and cost sync happen automatically.**
  expected_metric_impact: |
    cutting negotiation from 2 weeks to 4 days lets the buy-plan-to-order cycle
    compress by the same factor. The 5-day DSD claim is the industry-first metric
    the cover letter highlights — proven at Shein scale, now extending across formats.


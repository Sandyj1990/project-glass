what_it_does: |
  **From fabric to store, digitally mirrored.** Per Accenture s11, GMetri sits at
  the centre of a 3-pillar Digital Twin framing:

  - **Fabric** — simulate drape, texture &amp; colour in 3D to eliminate physical
    swatches and accelerate design alignment.
  - **Garment** — visualise fit, print placement and construction in real-time,
    reducing sampling cycles and costs.
  - **Garment Supply Chain** — track capacity, lead times and daily production rate
    digitally, enabling smarter sourcing decisions and faster negotiations.
  - **Store** — plan planograms, inventory and shelf layouts virtually, improving
    space utilisation and store-readiness before delivery of goods.

  Today's GMetri implementation focuses on the Store pillar at scale.

  Store managers use a digital replica of their store to check whether the right
  products are on the right shelves in the right quantities. Visual merchandising
  teams create shelf layout plans centrally and push them to all stores. Regional
  heads see compliance scores across their entire store network on a real-time
  dashboard.


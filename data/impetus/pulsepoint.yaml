slug: pulsepoint
title: PulsePoint
sub_title: "(Store Operations App)"
aliases: []
tagline: One mobile app for store managers — planogram compliance, daily tasks, sales KPIs and shift schedules. Replaces fragmented email + WhatsApp task management.
category: Sell · Store ops
status: live
status_label: Live

audience:
  - Store Managers
  - Department Managers
  - Sales Associates
  - Cluster Managers
  - Central Operations Teams

what_it_does: |
  **Store managers** get one mobile app for everything operational: checking
  whether products are placed correctly on shelves (planogram compliance),
  assigning and tracking daily tasks, viewing sales data, ROS (Rate of Sale),
  revenue and conversion, across today, this month and this year, running digital
  checklists (store opening, closing, visual merchandising walk) and managing
  staff schedules with shift-swap requests.

  **Cluster managers** see a summary across all their stores with the ability to
  drill into any individual store. **Central operations team** act as gatekeepers,
  creating tasks that need approval before reaching stores.

  Replaces fragmented email and WhatsApp-based task management.

scale_label: How Many Stores Use It
scale:
  - "1,605 of 1,926 stores (83%)"
  - "Rollout temporarily blocked by an app-naming issue"
  - "Multi-tenant setup live for Fashion Factory"
  - "Onboarded in 1 day per format"
scale_caption: |
  Next: push notifications for tasks, business-head dashboards, escalation rules.

what_improved:
  body: |
    **Store managers** see shelf compliance, tasks and sales in one app instead of
    switching between tools. **Cluster managers** get bird's-eye views with drill-
    down. **Store staff** pick available tasks instead of waiting for assignment.
    Paper-based opening/closing checklists replaced with digital versions. Fashion
    Factory stores onboarded in 1 day using the multi-tenant setup.
  expected_metric_impact: |
    improved task completion rates (currently unmeasured, moving from WhatsApp to
    tracked tasks), better planogram compliance (currently ~70% across stores),
    reduced HQ-to-store communication gaps. **Every task now has a digital trail.**


slug: companion-app
title: Store Companion
sub_title: "(Store Shopping Companion)"
aliases: [Companion App]
tagline: When you walk into a store, the app detects your location and switches to "companion mode" — outfit combinations, virtual try-on, scan to check size availability, complete payment without assistance.
category: Sell · In-store
status: live
status_label: Live

audience:
  - Customers (personalised in-store experience)
  - Store Managers (seeing what customers want)

what_it_does: |
  **App Feature Map · Optimising the sales force for peak performance.** Per
  Accenture s24, the Companion App is the in-store counterpart to AJIO web — the
  surface where customer intent meets store inventory in real time.

  When you walk into a store, the app detects your location and switches to
  "companion mode," showing content and offers tailored to that store. Browse
  complete outfit combinations, virtual try-on, scan items for details and
  availability, complete payment without assistance and earn rewards through fun
  challenges (scanning products, trying outfits, referrals). Store managers can
  see customer wishlists and help with orders across the entire store network.

scale_label: Rollout Status
scale:
  - "100 stores (pilot, March 2026)"
  - "All stores targeted by end of March"
  - "Live adoption dashboard (Geckoboard) tracking metrics"
  - "Tested at Trends Kamanhalli, Bangalore (Feb 13)"
scale_caption: |
  AJIO × TRENDS Companion video demo available. Loyalty integration project for
  Trends users underway.

what_improved:
  body: |
    **No formal release note yet.** Active rollout underway. Tested at Trends
    Kamanhalli, Bangalore (Feb 13). Priority features: find a product in-store,
    check size availability across stores, assisted ordering for customers. Moving
    from pilot to full rollout.
  expected_metric_impact: |
    every store interaction becomes a data point — wishlists, scan frequency,
    completion rates — helping merchandising teams understand what customers
    actually want vs. what's on the shelf. The Companion App is the in-store
    counterpart to the AJIO web channel — extends omnichannel from "buy online,
    pick in store" to "discover in store, complete on phone."


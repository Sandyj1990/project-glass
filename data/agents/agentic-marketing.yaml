patterns:
  - { name: "Multi-Agent Orchestration", usage: "Meta-Orchestrator coordinates 9 Domain Agents + 1 Compliance Agent · peer collaboration with explicit handoffs" }
  - { name: "Tool Calling",              usage: "Channel APIs (CleverTap, Google, Meta, WhatsApp, RCS), UCP signal queries, content generation, outcome attribution — all tool-mediated" }
  - { name: "Agent Memory",              usage: "Per-agent Firestore memory · prior campaign decisions feed next run; episodic + procedural" }
  - { name: "Wide Research",             usage: "Research + Audience agents explore many segment / lookalike candidates before Planning narrows" }
  - { name: "Observability",             usage: "Every agent decision traced · token-economical artefact-passing keeps context lean" }
  - { name: "Evals",                     usage: "Holdouts and A/B + bandit experiments built into every campaign by default" }

evals:
  status: "in-development · framework defined"
  approach: |
    Per-campaign holdouts and A/B suites will measure incrementality at
    run time. Cross-campaign: backtest agent-decided audiences and
    creatives against historical campaign outcomes; compare lift versus
    the manual baseline. Compliance Agent's gate-pass rate is its own
    audit metric. **Current state: framework documented; first end-to-end
    pilot campaign in setup. No measured numbers yet.**
  gates:
    - "Lift on holdouts ≥ baseline manual campaign lift"
    - "Compliance violations: zero pre-activation; flagged within 1 hr post-send"
    - "Frequency-cap and consent enforcement: 100% adherence"


primary_platform:
  name: "UCP"
  route: "/ucp/"

job:
  pain: |
    Today: 11 teams, 6 manual handoffs per campaign, weeks-long cycles.
    Marketing intelligence lives in PowerPoints, not systems. Each new
    campaign starts from scratch — no compounding learning. By the time
    performance data lands, the moment to course-correct has passed.
  what_it_does: |
    A marketing leader states intent + budget + dates + objective. The
    Meta-Orchestrator decomposes into sub-tasks. 9 Domain Agents
    collaborate on research, audience intelligence, planning, content,
    channel orchestration, experimentation, measurement, opportunity
    detection, and dashboard intelligence. A Compliance Agent enforces
    governance at every step. Outcome signals from each campaign feed
    back into the signal layer — knowledge compounds across runs.
  human_role: |
    Marketing leadership defines brand objectives, budget, brand rules,
    sensitive-category policy, approval thresholds. The agent runs the
    campaign loop. Humans intervene on guardrail violations and on
    strategic intent.


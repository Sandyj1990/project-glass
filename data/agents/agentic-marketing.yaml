workflow_diagram_caption: "Inputs (blue) feed Meta-Orchestrator, which fans out to 9 Domain Agents. Compliance + Approval gates (yellow) sit before activation. Outcome signals close the loop back to the agents."

workflow_steps:
  - { num: "01", title: "Marketer states intent",       detail: "Goal in plain English (\"Diwali sale for fashion · 30-50yr customers in Mumbai\"), budget, dates, objective. No segmentation, no creative briefs." }
  - { num: "02", title: "Meta-Orchestrator decomposes", detail: "Parses intent · creates a workflow DAG · routes parallelisable tasks (Research, Audience) to specialists, sequencing dependents." }
  - { num: "03", title: "9 Domain Agents collaborate",  detail: "Research mines prior campaigns. Audience builds segments + lookalikes. Planning drafts the brief. Content generates creatives. Channel selects mix + send-time. Experimentation wires A/B + holdouts. Measurement attributes outcomes. Opportunity detects anomalies. Dashboard surfaces summaries." }
  - { num: "04", title: "Compliance Agent gates",       detail: "Cross-cuts every action — consent enforcement, frequency caps, sensitive-category rules, brand-voice guardrails. Blocks any action that violates policy." }
  - { num: "05", title: "Approval gate",                detail: "Marketer reviews audience, creative, channel plan, spend forecast. Approves; activation proceeds. Rejects with notes; agents iterate." }
  - { num: "06", title: "Activation",                   detail: "Campaign launches across channels — SMS, WhatsApp, RCS, push, email, paid, in-app. Each personalised to person + household + context." }
  - { num: "07", title: "Outcome → signals",            detail: "Performance signals (clicks, conversions, lift, churn saves, revenue) write back into the signal layer. Next campaign starts from a smarter base — knowledge compounds." }


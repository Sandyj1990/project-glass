evals:
  status: "live · VLM reviewer + selection-rate as live metric"
  approach: |
    Two layers. Layer 1 — VLM reviewer scores every generated garment
    against 30+ checks (colour, print, silhouette, category) and auto-
    retries on failure. Layer 2 — buying team selection rate: % of agent
    designs taken into the range is the real-world signal. Trend
    business runs hit ~60% selection.
  gates:
    - "VLM 30+ checks pass before image ships"
    - "Selection rate stays above 50% per brand cohort"
    - "Cost-per-piece estimate within 10% of vendor RFQ on commercial sample"


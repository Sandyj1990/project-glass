workflow_diagram_caption: "Inputs (blue) → 8-step autonomous pipeline (grey) with VLM quality gate (yellow, auto-retry on fail) → vendor-ready package (green)."

workflow_steps:
  - { num: "01", title: "Brief ingestion",       detail: "Brand DNA, season direction, category specs, moodboard palette, target price band — pulled from buyer brief and the upstream Category Intelligence report." }
  - { num: "02", title: "Context agent",         detail: "Extracts brand palette, silhouette direction, print techniques and fabric preferences from the brief and reference set." }
  - { num: "03", title: "Artwork generation",    detail: "0-3 artwork images per garment with smart print detection. Solid garments skip artwork; printed garments get placement or AOP (all-over print) variants." }
  - { num: "04", title: "Garment image",         detail: "Full garment image (front + back, on-model, 2K resolution). Zone-aware artwork placement, gender-correct model, age-appropriate styling." }
  - { num: "05", title: "Quality review · VLM",  detail: "VLM reviewer scores 30+ quality checks per garment — colour accuracy, print fidelity, silhouette, category compliance. Auto-retry to step 03 on failure; ship only when checks pass." }
  - { num: "06", title: "BOM costing",           detail: "Cost per piece calculated via Costing Engine API — fabric, trims, SMV (standard minute value), overheads." }
  - { num: "07", title: "Variation engine",      detail: "Generates N silhouette and colour variations from reference images using the moodboard palette. Used for range building and style explosions." }
  - { num: "08", title: "Delivery",              detail: "Images uploaded to cloud storage via presigned URLs. Per-style webhook callbacks fire to downstream systems (PLM, vendor portals) in real time." }


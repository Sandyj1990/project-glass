primary_platform:
  name: "IntelliLoom"
  route: "/impetus/intelliloom/"

job:
  pain: |
    Manual design scaffolding takes weeks. Trend signals from WGSN,
    Pinterest, retail crawlers arrive unstitched to brand DNA. Tech-pack
    handoff to vendors loses fidelity — colour, print placement, BOM
    drift between spec and stitch.
  what_it_does: |
    Ingests trend signals + brand context + season constraints. Generates
    artwork variants, then full garment images (front + back, on-model,
    2K). VLM reviewer scores 30+ quality checks per garment with auto-retry
    on failure. Calculates BOM cost per piece. Produces silhouette and
    colour variations from reference images. Delivers share-ready line
    sheets to vendors and buyers.
  human_role: |
    Buyer reviews finished design packages — not briefs. Designer takes
    selected concepts into pattern-making and final tech-pack approval.
    Agent does the production-ready scaffolding; humans select what to
    range.


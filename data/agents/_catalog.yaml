    7 agents shipping in v1, executing across Plan, Buy and Sell. Each maps to one or more Reliance platforms. Each carries data, design patterns, and evals. More agents to follow.

# Section §02 grouping order — v1 ship list (D24 reduction · ai-photoshoot added 03-May-2026 · generative-media added 03-May-2026 · ai-cataloging disabled 03-May-2026 pending rebuild)

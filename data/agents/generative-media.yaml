# § 04 · Architecture · how it's built (developer-facing metadata · not rendered per agents-spec D22)
architecture:
  topology: "Multi-agent pipeline orchestrated by Temporal · 6 named sub-agents (Script Writer · Trend Scout · Brand Analyzer · Ralph Ideation · Performance · Brief Suggestion) · 9 durable Temporal workflows (ContentProduction · FrameGeneration · FirstLastFrameVideo · LongFormVideo · StoryboardFrame · AvatarGeneration · BrandAnalysis · TrendSync · ChatIdeation) · per-provider LLM circuit breakers + fallback chain."
  models:
    - "Claude (Anthropic) · primary LLM · scripts, brand analysis, chat, agentic tool-use loops"
    - "OpenAI · brief suggestions, trend analysis"
    - "Gemini · vision LLM · garment specs, frame grading"
    - "Vertex AI Imagen · primary frame and CTA generation"
    - "fal.ai (nano-banana-pro) · alternative frame generation"
    - "Veo · primary first-last-frame animation"
    - "Kling (fal.ai) · alternative video generation"
    - "Runway · video generation"
  tools:
    - "Temporal · workflow durability, retries, signals"
    - "FFmpeg · post-production · text overlays, xfade, colour grade, film grain, assembly"
    - "Pixelbin CDN · image delivery"
    - "GCS · video and asset storage"
    - "Langfuse · LLM / image / video tracing"
    - "Tool executor · agentic tool-use loops (search_products, update_draft, select_product)"
  memory:
    - "Brief library · approved briefs feed Ralph Ideation context"
    - "Brand DNA · style guide informs Script Writer + frame generation"
    - "Performance traces · feed back into the brief library via Performance Agent"
    - "Reference images · AI Photoshoot output + prior-season bestsellers as scene references"
  runtime: "FastAPI backend (Python 3.11+ · async) · PostgreSQL · Redis cache · Temporal.io for workflow durability · GCS + Pixelbin for storage · React + Zustand frontend"

# § 04 (rendered) · Design patterns used
patterns:
  - { name: "Multi-Agent Orchestration", usage: "6 specialist sub-agents (Script Writer · Trend Scout · Brand Analyzer · Ralph Ideation · Performance · Brief Suggestion) coordinated as durable workflows." }
  - { name: "Tool Calling",              usage: "Ralph Ideation Agent uses tool-use loops (search products · update draft · select product) to draft briefs against the live catalogue." }
  - { name: "Wide Research",             usage: "Long-form videos fan out parallel frame and video generation per scene (max 3 concurrent), then converge in video assembly." }
  - { name: "Context Engineering",       usage: "The reference processor categorises reference images (product · character · style) and prepares multimodal inputs for Gemini · brand-style context injected per script run." }
  - { name: "Agent Memory",              usage: "Brief library + brand DNA + performance traces persist as semantic + episodic memory · Performance Agent learnings feed back into the next brief." }

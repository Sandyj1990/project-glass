workflow_diagram_caption: "Inputs (blue, left · trend signals · brand DNA · product catalogue with planned AI Photoshoot integration · brief library · performance feedback) → 6 durable stages (centre · grey, with the orange Storyboard Review gate as the human-in-loop checkpoint) → Outputs (green, right · storyboard data · per-scene clips · shoppable feed · performance traces). Performance loop closes back to the brief library."

workflow_steps:
  - { num: "01", title: "Brief intake",        detail: "Brand approves a brief — sourced from chat ideation, a tracked trend, or a template. The brief kicks off the content production workflow." }
  - { num: "02", title: "Script + storyboard", detail: "Script Writer agent runs in multi-scene mode — generates narrative arc, scenes, visual treatment and captions. Routes through Claude (primary) with OpenAI / Gemini as backup." }
  - { num: "03", title: "Frame generation",    detail: "Per-scene first/last-frame stills generated via Vertex AI Imagen or fal.ai. Reference images sourced from the product catalogue today; AI Photoshoot integration on the roadmap. The grader scores quality checks and auto-retries on fail." }
  - { num: "04", title: "Video animation",     detail: "Per-scene Veo (Vertex · 4-8 s per clip) or Kling (fal.ai · 5-10 s per clip) animation between first and last frame · 9:16 or 16:9 · 720p or 1080p. Long-form videos fan out parallel scene generation; assembled with cross-fade scene transitions." }
  - { num: "05", title: "Post-production",     detail: "Video editor overlays text, colour-grades, applies film grain, and stitches an AI-generated CTA frame — single product card, multi-product grid, or brand outro. Non-blocking — original video is used if post-production fails." }
  - { num: "06", title: "Distribution",        detail: "Output ships to cloud storage, then served through the Shoppable feed (cached for 60-second freshness) with product hotspots and analytics tracking. Per-brand API keys exchanged for short-lived (15-minute) access tokens." }


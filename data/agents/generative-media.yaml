# § 01 · Job to be done
job:
  pain: |
    Brand video for social and storefront is the most expensive and slowest
    creative artefact a retailer ships. A single 15-30 s product reel runs
    through brief → storyboard → studio → shoot → edit → grade → CTA design
    — typically 3-6 weeks per format per brand, with talent and post costs
    that scale linearly with volume. Reliance's brand portfolio needs this
    output weekly across 100s of SKUs; the manual pipeline cannot.
  what_it_does: |
    Produces shoppable, on-brand video end-to-end. Trend Scout watches
    formats in market; Ralph Ideation drafts a brief; Brand Analyzer keeps
    style discipline; Script Writer turns the brief into a shot-by-shot
    storyboard; the frame stage generates first/last-frame stills using
    Vertex AI Imagen (AI Photoshoot output planned as scene reference);
    Veo or Kling animates each scene; FFmpeg post-production stitches text
    overlays and an AI-generated CTA frame; the Shoppable widget feeds the
    output into storefronts with product hotspots and analytics. Each
    stage is a durable workflow with retries and resumable state.
  human_role: |
    Brand reviews the storyboard at the Storyboard Review gate; can edit
    or reorder scenes inline. Performance Agent flags weak signals after
    publish; the human marketer decides which learnings feed back into
    the brief library. Trend selection and brand-safety overrides stay
    human.


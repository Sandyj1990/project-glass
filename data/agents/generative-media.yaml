# § 05 (rendered) · Evals · how we know it works
evals:
  status: "in-development"
  approach: |
    Three layers run today on the Fynd-product side. **Layer 1 ·
    per-asset frame grading** — the grader scores every generated frame
    against quality checks (colour accuracy · print fidelity ·
    silhouette · category compliance); auto-retries on fail; ships only
    when checks pass. **Layer 2 · trace lineage** — Langfuse captures
    every AI, image and video call; the grader reconstructs full
    pipeline lineage from any grading report. **Layer 3 · post-publish
    performance** — Performance Agent reads engagement, CTR and
    attributed sales; learnings feed back into the brief library so the
    next brief starts smarter.
  gates:
    - "Frame grade passes per-scene quality checks before the scene goes to video"
    - "Storyboard Review gate · brand approves the storyboard before any video call (cost gate)"
    - "Post-production failure is non-blocking — original video ships if overlays fail"
    - "AI provider resilience · automatic fallback chain (Claude → OpenAI → Gemini → Vertex) when any provider fails"
    - "68% backend test-coverage gate enforced in CI · separate eval suites for prompt regression"


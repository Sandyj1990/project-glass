primary_platform:
  name: "JCP Cataloging"
  route: "/jcp/cataloging/"

job:
  pain: |
    Catalog production = 15 days per shoot. Doesn't scale across SKUs,
    seasons or brands. Output inconsistent — different studios, different
    models, different lighting. Attribute enrichment is manual and lossy.
    Motion video requires a separate production pass.
  what_it_does: |
    Takes a mannequin photo or product image. Generates a model-on shoot
    with consistent face from a brand-controlled model library
    (ethnicity, age, size, gender). Enriches the catalog page with
    structured attributes via VLM extraction. Produces a motion video
    of the same SKU. Runs in 5 hours per shoot at scale.
  human_role: |
    Brand sets the model library, attribute taxonomy, channel catalog
    spec, brand-tone rules. Catalog ops reviews flagged outputs (face
    drift, attribute confidence below threshold). Agent does the
    production; humans QA the exceptions.


workflow_diagram_caption: "Inputs (blue) → 7-step pipeline (grey) with QA gate (yellow, auto-retry on fail) → channel-published outputs (green)."

workflow_steps:
  - { num: "01", title: "Garment understanding",   detail: "VLM extracts category, cut, drape, colour, print and construction from the input mannequin / product photo." }
  - { num: "02", title: "Model selection",         detail: "Picks a model from the brand-controlled library — ethnicity, age, size, pose constrained by brand spec." }
  - { num: "03", title: "Photoshoot generation",   detail: "Generates the model-on shot with consistent face. Multi-angle, scene-aware lighting, brand-styled background." }
  - { num: "04", title: "Catalog enrichment",      detail: "Structured attribute extraction mapped to channel-specific field schemas (TIRA, JioMart, AJIO each have their own taxonomy)." }
  - { num: "05", title: "Video generation",        detail: "4-6 second motion video — model walks / spins, with detail close-ups on construction features. PDP-ready." }
  - { num: "06", title: "QA gate · auto + human",  detail: "Automated checks — face-consistency, attribute confidence threshold, channel-spec compliance. Auto-retry to step 03 on failure. Human QA reviews flagged exceptions only." }
  - { num: "07", title: "Publish to channels",     detail: "Channel-native formatting and delivery: TIRA, JioMart, AJIO, Reliance Trends, Reliance Digital. CDN delivery for image + video assets." }

data:
  sources:
    - { name: "Mannequin / product images", classification: "Mixed",            entities: "Studio shots · vendor catalogue images" }
    - { name: "Brand model library",        classification: "Human-Created",    entities: "Approved model identities · ethnicity · age · size · pose" }
    - { name: "Attribute taxonomy",         classification: "Machine-Readable", entities: "Colour · fabric · neckline · sleeve · pattern · construction" }
    - { name: "Channel catalog spec",       classification: "Machine-Readable", entities: "TIRA / JioMart / AJIO / Reliance Trends field schemas" }
  refresh_cadence: "Per-SKU run · brand library and taxonomy refreshed seasonally."
  kpis_moved:
    - "Time-to-catalog (15 days → 5 hours)"
    - "Attribute fill rate"
    - "Face-consistency score"
    - "PDP conversion lift (with video vs without)"

patterns:
  - { name: "Tool Calling",         usage: "VLM, image gen, video gen, channel-publish APIs, CDN — all tool-mediated" }
  - { name: "Multi-Agent Orchestration", usage: "Garment-understanding agent + Model-selection + Generation + Enrichment + QA agents collaborate" }
  - { name: "Wide Research",        usage: "Multiple model + scene candidates explored before QA-gate narrows to publish set" }
  - { name: "Evals",                usage: "External TIRA reviewer audit + internal eval framework + per-output QA checks · 3 layers" }
  - { name: "Observability",        usage: "Per-SKU trace · model used · QA score · channel publish status · regen attempts logged" }

evals:
  status: "live · 3-layer eval"
  approach: |
    Layer 1 — automated per-output QA: face-consistency score, attribute
    confidence, channel-spec validation; auto-retry on fail. Layer 2 —
    external TIRA Catalog Enrichment Evals: independent reviewer scores
    accuracy, completeness and brand alignment on a sample. Layer 3 —
    internal Reliance reviewer rubric for ongoing regression detection.
  gates:
    - "Face-consistency score above brand threshold per SKU"
    - "Attribute fill rate ≥ 90% per channel-spec mandatory fields"
    - "External reviewer accuracy ≥ baseline manual catalog quality"

linked_platforms:
  - { name: "JCP Cataloging",  route: "/jcp/cataloging/",  role: "Primary surface · agent runs the cataloging pipeline" }
  - { name: "PixelBin",        route: "/pixelbin/",        role: "Image + video transforms infrastructure" }

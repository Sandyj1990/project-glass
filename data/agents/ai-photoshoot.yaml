# § 05 (rendered) · Evals · how we know it works
evals:
  status: "in-production"
  approach: |
    Every generated image is scored before delivery. Base 10.0; deduct =
    `total_issues × (avg_confidence / 100) × 1.5`. Score ≥ 7.0 → Approved
    and delivered. Below 7.0 → routed to Manual QC for brand review. Current
    crop-extraction pipeline runs at 8.06/10 average.
  gates:

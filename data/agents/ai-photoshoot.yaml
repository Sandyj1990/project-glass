# § 04 · Architecture · how it's built (developer-facing metadata · not rendered per agents-spec D22)
architecture:
  topology: "Multi-agent — Detection Agent · Edit Agent · Check Agent · validate-retry loop with max 2 attempts per image. Conversation-thread approach for face consistency in lingerie pipeline (8-stage C1-C8)."
  models:
    - "Vision-Language Models (VLMs) for detection + scoring"
    - "Image generation models for on-model synthesis"
    - "Text-based identity construction (NSFW workaround for lingerie)"
  tools:
    - "Code execution for zoom/crop inspection of fine details"
    - "Bounding-box generator with validation loop"
    - "Conversation threading for cross-view face consistency"
  memory:
    - "Per-job · prompt + reference image set + generated outputs"
    - "Pose pool · 12 camera view types per category"
    - "Score history · per image, per issue"
  runtime: "AI Photoshoot platform · agentic pipeline · GCS delivery"


workflow_steps:
  - { num: "01", title: "Upload",              detail: "Product reference images (front · back · side) uploaded to the platform. Supports clothing, footwear and lingerie." }
  - { num: "02", title: "Analyse",             detail: "Product image views classified (front · back · side · three-quarter). Garment details extracted: fabric · colour · pattern · silhouette." }
  - { num: "03", title: "Avatar & Pose",       detail: "User selects avatars (gender · age · ethnicity) and poses from the pool. 12 camera view types available — front · back · side · full-angle · closeup · angled." }
  - { num: "04", title: "Background & Lighting", detail: "Background image selected. Lighting characteristics (direction · warmth · type) extracted to blend the model into the scene." }
  - { num: "05", title: "Prompt",              detail: "Natural language prompt assembled per pose: product + avatar + theme + view-aware lighting + filtered accessories. Polished for flow and grammar." }
  - { num: "06", title: "Generate",            detail: "On-model images generated in parallel batches (up to 20 concurrent). Background reference image passed alongside the prompt. Supports 4K output." }
  - { num: "07", title: "Detection",           detail: "Unified Detection Agent scans each generated image against product references. Detects colour · logo · print · fabric · pose mismatches with code execution for zoom/crop inspection." }
  - { num: "08", title: "Auto-Edit",           detail: "Edit Agent fixes detected issues with bounding-box-guided surgical editing. Validate-retry loop with max 2 attempts per image. Identity and background preservation enforced." }
  - { num: "09", title: "Quality",             detail: "Images scored — 10.0 base, deductions per issue. Score ≥ 7.0 → Approved. Below routes to Manual QC. Realism weighted: Human 55% · Product 30% · Scene 15%." }
  - { num: "10", title: "Deliver",             detail: "Final images uploaded to GCS, resolution-optimised, available via CDN. Ajio-standard naming convention: style_id/color_id/product_id/MODEL.jpg." }


# Primary platform shown on the catalog card
primary_platform:
  name: "AI Photoshoot"
  route: "/impetus/ai-photoshoot/"

# § 01 · Job to be done
job:
  pain: |
    Catalogue photoshoots gate every retail launch. Studio booking, model
    availability, stylists and post-production stretch each category drop by
    weeks. Lingerie alone runs 3-4× standard cost on talent and lighting,
    with turnarounds of 4-6 weeks. Volume scales linearly with cost.
  what_it_does: |
    Generates on-model catalogue images from flat-lay or mannequin reference
    shots. Three modes — Instant (2-4 minutes per set), Batch (cost-optimised
    bulk), and Single Image (on-demand QC fixes). Agentic across accessory
    placement, lighting extraction, autonomous issue detection and surgical
    Auto-Edit. Output lands on GCS with Ajio-standard naming, ready to list.
  human_role: |
    Brand QC reviews any image scoring below 7.0 (routed to Manual QC).
    Category onboarding remains human-led for new pods. Final approval before
    go-live to Ajio stays with the brand cataloguing team.


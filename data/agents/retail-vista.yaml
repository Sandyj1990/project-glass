  - { name: "Tool Calling",         usage: "Each specialist sub-agent calls BigQuery, Google Maps, Routes API, and the H3 spatial library" }
  - { name: "Deep / Hierarchical",  usage: "Root orchestrator routes queries to Location · Catchment · Intelligence · Strategic specialists" }
  - { name: "Wide Research",        usage: "4-stage opportunity engine generates many candidates before scoring narrows to a shortlist" }
  - { name: "Context Graphs",       usage: "H3 hex grid is the spatial graph; every entity (store, household, property) carries hex-level context" }
  - { name: "Observability",        usage: "Every score breakdown is traceable back to the 10 dimensions and the underlying datasets" }

# § 05 · Evals
evals:
  status: "in-development"
  approach: |
    Backtest opportunity scores against year-1 sales of recently opened
    Reliance Retail stores. Compare ranked recommendations vs the lease
    decisions actually taken; measure selection accuracy and missed-market
    cost.
  gates:
    - "Top-20% recommended sites match year-1 sales-per-sq-ft above the format median"
    - "Cannibalisation rate on recommended sites stays below 5%"
    - "Conversational workspace returns answers grounded in source datasets — every claim cites the dataset"


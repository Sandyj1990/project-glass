# § 01 · Job
job:
  pain: |
    Site selection runs on manual research, fragmented data, and individual
    judgement — weeks per location, inconsistent across teams, missed
    high-potential markets, and no visibility into cannibalisation risk.
  what_it_does: |
    Builds a single spatial fabric over India — H3 hex grid, 61 curated
    datasets, competitor map. Surfaces high-potential sites, scores them
    on 10 business dimensions, ranks by vertical-specific weights. The
    expansion team interrogates the map and the pipeline through a
    conversational workspace.
  human_role: |
    Expansion lead reviews the prioritised pipeline, signs off on shortlist
    visits, and takes the final lease decision. The agent does the
    discovery, scoring and analysis; the human owns commitment.


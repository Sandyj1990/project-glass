workflow_steps:
  - { num: "01", title: "Candidate sourcing",         detail: "Competitor ring expansion · whitespace detection · density hotspots · city seeding · property leads — surfaces a long-list per query." }
  - { num: "02", title: "Whitespace filtering",       detail: "BigQuery spatial queries isolate the top-20% demand areas with no existing coverage." }
  - { num: "03", title: "10-dimension scoring",       detail: "Wealth Index · Building Density · Demographics · District GDP · Spending Power · Footfall · Competitive Intensity · Accessibility · Property Rates · JioMart Order Density." }
  - { num: "04", title: "Vertical-weighted ranking",  detail: "Composite score with vertical-specific weights. Quick Commerce emphasises demand + order density; Fashion emphasises footfall + complementary retail. Geographic diversity capping prevents cluster-heavy recommendations." }
  - { num: "05", title: "Conversational workspace",   detail: "Root orchestrator (Gemini 2.5 Pro) routes natural-language queries to 4 specialist sub-agents — Location · Catchment · Intelligence · Strategic. Each runs its own tool stack against BigQuery, Google Maps APIs, and the H3 grid." }
  - { num: "06", title: "Human verification gates",   detail: "Expansion team reviews the shortlist, signs off on field visits, takes the lease commitment. Agent does the discovery and analysis; human owns the decision." }


slug: category-intelligence
name: Category Intelligence Agent
sub_title: "Category × season × geography → 40-50pp evidence-tagged trend report. Built for buying teams, not for press."
status: build
status_label: Building
track: plan
autonomy_level: L4
primary_workflow: "Category Strategy"
date: 2026-04-15
source_folder: ~/Documents/work/trend-engine/
source_citations:
  - "Trend Engine repo · ~/Documents/work/trend-engine"
  - "category-intelligence-workflow-diagram.png"
  - "Worked example: Women's Midi Dresses · SS27 · India"

stats:
  - { label: "Pipeline",         value: "7 steps",      context: "Brief → Research → Images → Build → Polish → Verify → Audit → Ship" }
  - { label: "Output depth",     value: "40-50 pp",     context: "evidence-tagged · A4 PDF" }
  - { label: "Quality checks",   value: "18 automated", context: "post-build · regression-gated" }

primary_platform: ~   # No standalone platform page · agent surface is the catalog itself

job:
  pain: |
    Trend research today = ad-hoc Pinterest scrolls + WGSN extracts + a
    designer's gut. Inputs are unstitched to brand DNA, evidence rarely
    survives the handoff to buying, and trend calls land as opinions, not
    signals you can audit.
  what_it_does: |
    Takes a category × season × geography brief and produces a 40-50 page
    PDF report: evidence-tagged trend analysis across silhouette, fabric,
    colour, print and detail; 5 capsule design concepts with evidence
    panels and AI-generated line sheets; competitive benchmarking with
    retailer evidence grid; risk classification (safe bet / calculated
    risk / test &amp; react); and a print design brief for textile teams.
  human_role: |
    Buying lead approves the brief and the four review checkpoints.
    Designer takes the capsules into pattern-making. Agent does the
    research, structuring, image generation, and writing — humans
    decide what to act on.


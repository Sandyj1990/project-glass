workflow_steps:
  - { num: "01", title: "Brief ingestion",        detail: "Buying lead supplies category · season · geography. Plus brand DNA, price tier, target consumer, occasion calendar (festive / wedding / monsoon)." }
  - { num: "02", title: "Research · 3 tiers",     detail: "Tier 1 runway + forecast (Vogue Runway, Tagwalk, WGSN, EDITED, Heuritech). Tier 2 retail (Myntra, AJIO, Nykaa, Net-a-Porter, Reliance Trends). Tier 3 consumer (Pinterest, Google Trends, TikTok). Every signal carries an evidence tag — RUNWAY, RETAIL, SEARCH, SOCIAL, TRADE, FORECAST." }
  - { num: "03", title: "Image generation",       detail: "Line sheets, capsule illustrations, fabric textures, print swatches, cover images. GPT Image 2 + Vertex Imagen, with Fynd logo as reference for brand-mark fidelity." }
  - { num: "04", title: "Build PDF",              detail: "react-pdf renders A4 portrait pages (landscape for line sheets). Structured data (palettes, capsules, ratings) + editorial prose, page-by-page designed — not HTML-to-PDF conversion." }
  - { num: "05", title: "Polish",                 detail: "Layout, typography, visual hierarchy. Market-specific framing — Indian climate, occasion mapping, fusion sensibility, price tier nuance." }
  - { num: "06", title: "Verify · 18 auto-checks", detail: "Image aspect ratios, banned strings, section ordering, evidence legend presence, Fynd Create branding, file size, swatch visibility, radar-chart label positioning. Regression-gated — fail one, the build doesn't ship." }
  - { num: "07", title: "Audit + Ship",           detail: "Independent fashion-report-reviewer agent scores against a 5-dimension rubric (evidence rigour, content quality, visual completeness, structural compliance, editorial quality). Buying lead signs off; report ships to design team." }

data:
  sources:
    - { name: "Vogue Runway / Tagwalk", classification: "Machine-Readable", entities: "Runway looks · designer attribution · season · category" }
    - { name: "Retail crawlers",        classification: "Machine-Created",  entities: "SKU listings · price · attributes · brand · stock signals" }
    - { name: "Pinterest / Google Trends / TikTok", classification: "Machine-Created", entities: "Search velocity · pin counts · hashtag engagement" }
    - { name: "WGSN · EDITED · Heuritech", classification: "Mixed",         entities: "Forecast reports · trend velocity · colour confidence" }
    - { name: "Brand DNA brief",        classification: "Human-Created",    entities: "Target consumer · price tier · occasion · construction guardrails" }
  refresh_cadence: "Per-report run · research is fresh-pulled at brief time. Reports versioned with date stamp."
  kpis_moved:
    - "Time-to-trend-call (weeks → days)"
    - "Evidence coverage (% claims with source tag)"
    - "Capsule selection rate by buying team"
    - "Reduction in trend miss-fire (in-season markdown rate on agent-recommended SKUs)"

patterns:
  - { name: "Wide Research",        usage: "3-tier research generates many candidate trend signals before scoring narrows to a shortlist" }
  - { name: "Tool Calling",         usage: "Crawlers, image generation APIs, PDF rendering, post-build check runners — all tool-mediated" }
  - { name: "Deep / Hierarchical",  usage: "Slash-command orchestrator (/trend-report) routes to specialist sub-pipelines per report stage" }
  - { name: "Context Engineering",  usage: "Brief + brand DNA + market frame compressed into per-section context; report-config layer enforces consistency" }
  - { name: "Evals",                usage: "18 post-build auto-checks + independent fashion-report-reviewer 5-dim audit; both gate ship" }
  - { name: "Observability",        usage: "Every trend call traces back to its source signal and evidence tier" }

evals:
  status: "live · 18-check regression suite + independent reviewer"
  approach: |
    Two-layer eval. Layer 1 — 18 post-build automated checks gate the
    build (image ratios, banned strings, section ordering, evidence
    legend, file size, etc.). Layer 2 — an independent fashion-report
    reviewer agent scores each report against a 5-dimension rubric
    (evidence rigour, content quality, visual completeness, structural
    compliance, editorial quality), 0-100 each.
  gates:
    - "All 18 post-build checks pass · zero regressions"
    - "Reviewer score ≥ 75 / 100 across each of 5 dimensions"
    - "Every trend call carries an evidence tag"


workflow_diagram_caption: "Inputs (blue) → Workflow (grey, steps 01-06) → Outputs (green). Step 06 loops exceptions back to Build."

workflow_steps:
  - { num: "01", title: "Ingest unified inputs",            detail: "Sales · returns · inventory · margin · targets (Sales · GM% · Markdown) · store space and fixture capacities · real-time inventory · VM guidelines and grouping rules." }
  - { num: "02", title: "Build store-first Plan of Record", detail: "Converts targets + demand signals + store constraints into store-level plans (WSSI · OTB · assortment · financial planning). Runs scenario simulations across assortment × intake × price. Selects optimal plan by margin, risk, feasibility." }
  - { num: "03", title: "Control OTB actions",              detail: "Orchestrates commit / chase / hold / cancel decisions under defined risk guardrails." }
  - { num: "04", title: "Autonomous VM planning",           detail: "Translates assortment + inventory into visually optimised layouts at fixture and slot level. Balances aesthetics, inventory availability and feasibility against brand VM guidelines (palette, arrangement styles)." }
  - { num: "05", title: "Deliver execution outputs",        detail: "Store Plan of Record + rolling WSSI · OTB recommendations · assortment depth/option plans · store-specific planograms/elevations · fill/degradation indicators + exception alerts with corrective actions." }
  - { num: "06", title: "Monitor and replan",               detail: "Continuous performance monitoring; exception-detection triggers replans rather than waiting for the next planning cycle." }


# § 04 · Architecture · how it's built

# architecture_svg: ~  # SVG to be authored once user approves the workflow style
architecture:
  topology: "Hierarchical — Planner → 4 specialist sub-agents (assortment · OTB · VM · simulation) → integrator"
  models:
    - "Gemini 2.5 Pro"
    - "Claude Opus 4.X"
  tools:
    - "WSSI calculator"
    - "Scenario simulator"
    - "VM constraint solver"
    - "OTB decision orchestrator"
  memory:
    - "Semantic · store traits, brand VM rules"
    - "Episodic · prior replans and outcomes"
    - "Procedural · fallback logic for constraint violations"
  runtime: "Cortex platform · GCP Vertex AI"

# § 05 · Design patterns used (cross-link anchors to /agents/#building-blocks)
patterns:
  - { name: "Tool Calling",         usage: "Pulls live OTB · WSSI · stock from Impetus + Databricks" }
  - { name: "Context Engineering",  usage: "Compresses store traits + active VM rules into per-replan context" }
  - { name: "Agent Memory",         usage: "Episodic memory of prior replans avoids re-asking solved questions" }
  - { name: "Wide Research",        usage: "Generates N candidate plans, scores on margin × risk × feasibility, picks one" }
  - { name: "Deep / Hierarchical",  usage: "Planner delegates to specialist sub-agents per planning dimension" }
  - { name: "Observability",        usage: "Every replan trace records inputs, scenarios scored, decision rationale" }

# § 06 · Evals · how we know it works
evals:
  status: "in-development"
  approach: |
    Replay historical seasons; score plan-vs-actual sell-through and margin
    against the best-case manual plan as the holdout benchmark.
  gates:
    - "Margin within 2% of best-case manual plan on holdout season"
    - "Replan latency < 4 hours from exception trigger"
    - "Constraint-respect rate > 99% (no plans violate VM rules or OTB ceiling)"


# § 01 · Job to be done
job:
  pain: |
    Today, planning is monthly, spreadsheet-driven, store-agnostic. Plans
    land in stores with assumptions baked in that no longer match real
    space, real inventory, or real demand.
  what_it_does: |
    Builds a store-realistic Plan of Record. Converts top-down financial
    targets into store-level plans that reflect real space, inventory and
    demand constraints. Translates assortment + inventory into fixture-
    level and slot-level VM layouts. When conditions change — a delayed
    shipment, an underperforming category, a competitive signal — the
    agent generates an exception-led replan.
  human_role: |
    Planner sets targets and reviews replans. Agent does not replace
    planning. It makes planning continuous.

